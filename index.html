  <!-- Instant branded loading screen (inline so it paints before CSS/JS load) -->
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF9F6;
      opacity: 1;
      transition: opacity .45s ease;
    }
    #app-loader.is-hidden { opacity: 0; pointer-events: none; }
    #app-loader .app-loader__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    #app-loader .app-loader__logo {
      width: 200px;
      max-width: 60vw;
      height: auto;
      animation: appLoaderPulse 1.6s ease-in-out infinite;
    }
    #app-loader .app-loader__spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(164, 25, 44, 0.18);
      border-top-color: #A4192C;
      animation: appLoaderSpin .8s linear infinite;
    }
    @keyframes appLoaderSpin { to { transform: rotate(360deg); } }
    @keyframes appLoaderPulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
    @media (prefers-reduced-motion: reduce) {
      #app-loader .app-loader__logo,
      #app-loader .app-loader__spinner { animation: none; }
    }
  </style>

</head>
<body>
  <div id="app-loader" role="status" aria-label="Wird geladen">
    <div class="app-loader__inner">
      <img class="app-loader__logo" src="/assets/noon-email-logo-transparent.png" alt="NOON Sprachdienst" width="200" />
      <div class="app-loader__spinner" aria-hidden="true"></div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    /* Hide the branded loader once the real app content has replaced the
       lazy-route placeholder (or after a safety timeout), then remove it. */
    (function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      var start = Date.now();
      function ready() {
        var root = document.getElementById('root');
        if (!root) return false;
        // Still showing the Suspense fallback -> lazy chunks not ready yet.
        if (root.querySelector('.route-loading')) return false;
        var main = root.querySelector('main');
        return !!main && main.childElementCount > 0;
      }
      function hide() {
        loader.classList.add('is-hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
        }, 500);
      }
      function check() {
        if (ready() || Date.now() - start > 8000) { hide(); return; }
        window.requestAnimationFrame(check);
      }
      window.requestAnimationFrame(check);
    })();
  </script>
</body>
</html>
